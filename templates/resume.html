<!DOCTYPE html>
<html>

<head>

<title>Verifia AI Resume Analyzer</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
padding:40px;
}

.card{
background:#0f172a;
padding:30px;
width:650px;
margin:auto;
border-radius:10px;
}

textarea{
width:100%;
height:120px;
margin-top:10px;
background:#020617;
color:white;
border:1px solid #1e293b;
padding:10px;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:#3b82f6;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
}

#output{
margin-top:30px;
}

</style>

</head>

<body>

<div class="card">

<h2>Resume Intelligence Audit</h2>

<input type="file" id="pdfFile">

<textarea id="jobDesc" placeholder="Paste Job Description (optional)"></textarea>

<button onclick="analyze()">Analyze Resume</button>

<div id="output"></div>

</div>

<script>

async function analyze(){

const file=document.getElementById("pdfFile").files[0];

if(!file){

alert("Upload resume first");
return;

}

const fd=new FormData();

fd.append("file",file);

const jd=document.getElementById("jobDesc").value;

fd.append("job_description",jd);

const res=await fetch("/verify",{

method:"POST",
body:fd

});

const data=await res.json();

document.getElementById("output").innerHTML=`

<hr>

<b>Name:</b> ${data.candidate_profile.name || "Unknown"} <br>
<b>Email:</b> ${data.candidate_profile.email || "Not found"} <br>
<b>Phone:</b> ${data.candidate_profile.phone || "Not found"} <br>

<hr>

<b>Experience:</b> ${data.experience_years_estimated} years

<hr>

<b>ATS Score:</b> ${data.ats_match_score ?? "N/A"} %

<hr>

<b>Matched Skills:</b> ${(data.matched_skills||[]).join(", ")}

<hr>

<b>Missing Skills:</b> ${(data.missing_skills||[]).join(", ")}

<hr>

<b>Detected Skills:</b> ${(data.skills_detected||[]).join(", ")}

<hr>

<b>GitHub:</b> ${data.github_profile || "Not Found"}

<hr>

<b>GitHub Verified:</b> ${data.github_data.verified}

<hr>

<b>Project Authenticity Score:</b> ${data.project_authenticity_score}

<hr>

<b>Candidate Score:</b> ${data.candidate_score}

<hr>

<b>Interview Questions:</b>
<br>
${(data.interview_questions||[]).join("<br>")}

`;

}

</script>

</body>

</html>
