<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Verifia-AI | Resume Intelligence</title>

<style>

body{
background:#020617;
color:white;
font-family:Inter, Arial;
margin:0;
padding:40px;
}

.top-bar{
margin-bottom:30px;
}

.back-btn{
background:#1e293b;
color:white;
border:1px solid #3b82f6;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
}

.back-btn:hover{
background:#334155;
}

.wrapper{
display:flex;
justify-content:center;
}

.card{
background:#0f172a;
padding:40px;
border-radius:12px;
width:650px;
border:1px solid #1e293b;
}

h2{
margin-top:0;
color:#3b82f6;
}

.section-title{
margin-top:20px;
color:#60a5fa;
font-weight:bold;
}

input[type="file"]{
margin-top:15px;
width:100%;
}

button.action-btn{
width:100%;
padding:14px;
margin-top:20px;
background:#3b82f6;
border:none;
border-radius:8px;
color:white;
font-weight:bold;
cursor:pointer;
}

button.action-btn:hover{
opacity:0.9;
}

#output{
margin-top:25px;
font-size:0.95rem;
line-height:1.6;
}

hr{
border:1px solid #1e293b;
margin:20px 0;
}

.skill{
margin-bottom:5px;
}

.risk-low{
color:#22c55e;
font-weight:bold;
}

.risk-medium{
color:#facc15;
font-weight:bold;
}

.risk-high{
color:#ef4444;
font-weight:bold;
}

</style>
</head>

<body>

<div class="top-bar">
<button class="back-btn" onclick="confirmExit()">
← Back to Home
</button>
</div>

<div class="wrapper">

<div class="card">

<h2>Resume Intelligence Audit</h2>

<input type="file" id="pdfFile" accept="application/pdf">

<button class="action-btn" onclick="startAudit()">
Analyze Resume
</button>

<div id="output"></div>

</div>
</div>

<script>

function getRiskClass(risk){

if(risk==="LOW RISK") return "risk-low";
if(risk==="MEDIUM RISK") return "risk-medium";

return "risk-high";
}

async function startAudit(){

const fileInput=document.getElementById('pdfFile');

if(!fileInput.files.length){
alert("Please select a PDF file first.");
return;
}

const fd=new FormData();

/* must match FastAPI parameter */
fd.append('file',fileInput.files[0]);

try{

const res=await fetch('/verify',{
method:'POST',
body:fd
});

const data=await res.json();

if(data.error){
document.getElementById("output").innerHTML="<hr>"+data.error;
return;
}

let skillsHTML="";

for(const stream in data.skills_detected){

skillsHTML+=`<div class="section-title">${stream}</div>`;

data.skills_detected[stream].forEach(s=>{

skillsHTML+=`<div class="skill">• ${s.skill} (${s.confidence}%)</div>`;

});

}

let alertsHTML=(data.risk_alerts||[]).length
? data.risk_alerts.join("<br>")
: "None detected";

let questionsHTML=(data.interview_questions||[]).length
? data.interview_questions.map(q=>"• "+q).join("<br>")
: "No questions generated";

const riskClass=getRiskClass(data.risk_level);

document.getElementById("output").innerHTML=`

<hr>

<div class="section-title">Candidate Profile</div>
<b>Name:</b> ${data.candidate_profile.name || "Unknown"} <br>
<b>Email:</b> ${data.candidate_profile.email || "Not found"} <br>
<b>Phone:</b> ${data.candidate_profile.phone || "Not found"} <br>

<hr>

<div class="section-title">Primary Domain</div>
${data.primary_stream}

<hr>

<div class="section-title">Experience Intelligence</div>
Estimated Experience: ${data.experience_years_estimated} years

<hr>

<div class="section-title">Candidate Risk Level</div>
<span class="${riskClass}">
${data.risk_level}
</span>

<hr>

<div class="section-title">Integrity Score</div>
${data.integrity_score}/100

<hr>

<div class="section-title">Detected Skills</div>
${skillsHTML}

<hr>

<div class="section-title">Integrity Alerts</div>
${alertsHTML}

<hr>

<div class="section-title">AI Interview Questions</div>
${questionsHTML}

`;

}catch(error){

document.getElementById("output").innerHTML=
"<hr>Error processing resume.";

}

}

function confirmExit(){

const confirmLeave=confirm(
"Are you sure you want to leave?\nYour resume analysis will be lost."
);

if(confirmLeave){
window.location.href="/";
}

}

</script>

</body>
</html>
