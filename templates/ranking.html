<!DOCTYPE html>
<html>

<head>

<title>Resume Ranking Dashboard</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
padding:40px;
}

.card{
background:#0f172a;
padding:30px;
border-radius:10px;
width:700px;
margin:auto;
}

input,textarea{
width:100%;
margin-top:10px;
padding:10px;
background:#020617;
color:white;
border:1px solid #1e293b;
}

button{
margin-top:20px;
padding:12px;
width:100%;
background:#3b82f6;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
}

.rank{
margin-top:15px;
padding:10px;
border-bottom:1px solid #1e293b;
}

</style>

</head>

<body>

<div class="card">

<h2>AI Resume Ranking System</h2>

<input type="file" id="resumes" multiple>

<textarea id="jd" placeholder="Paste Job Description"></textarea>

<button onclick="rank()">Rank Candidates</button>

<div id="results"></div>

</div>

<script>

async function rank(){

const files=document.getElementById("resumes").files

if(files.length==0){
alert("Upload resumes")
return
}

const fd=new FormData()

for(let f of files){
fd.append("resumes",f)
}

fd.append("job_description",document.getElementById("jd").value)

const res=await fetch("/rank-resumes",{
method:"POST",
body:fd
})

const data=await res.json()

let html="<h3>Candidate Ranking</h3>"

data.ranking.forEach((c,i)=>{

html+=`

<div class="rank">

<b>${i+1}. ${c.name}</b>

<br>

Score: ${c.score}

<br>

Experience: ${c.experience} years

<br>

Skills: ${c.skills.join(", ")}

</div>

`

})

document.getElementById("results").innerHTML=html

}

</script>

</body>

</html>
