<!DOCTYPE html>
<html>

<head>

<title>Verifia AI Leaderboard</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
padding:40px;
}

table{
width:700px;
margin:auto;
border-collapse:collapse;
}

th,td{
border:1px solid #1e293b;
padding:12px;
text-align:center;
}

th{
background:#1e293b;
}

</style>

</head>

<body>

<h2 align="center">🏆 Verifia AI Candidate Ranking</h2>

<table id="board">

<tr>
<th>Rank</th>
<th>Name</th>
<th>Email</th>
<th>Score</th>
</tr>

</table>

<script>

async function loadLeaderboard(){

const res = await fetch("/leaderboard")

const data = await res.json()

let rows=""

data.leaderboard.forEach(c=>{

rows += `
<tr>
<td>${c.rank}</td>
<td>${c.name}</td>
<td>${c.email}</td>
<td>${c.score}</td>
</tr>
`

})

document.getElementById("board").innerHTML += rows

}

loadLeaderboard()

</script>

</body>

</html>
